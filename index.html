<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>버스타고 통학하자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, 'Noto Sans KR', sans-serif;
  background: #fff;
  color: #1d1d1f;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── CSS VARS ─── */
:root {
  --white: #ffffff;
  --bg: #f5f5f7;
  --bg2: #fbfbfd;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.12);
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --blue: #0071e3;
  --blue-light: #e8f0fe;
  --green: #34c759;
  --green-light: #e8f8ed;
  --amber: #ff9500;
  --amber-light: #fff3e0;
  --red: #ff3b30;
  --red-light: #ffebea;
  --r: 12px;
  --r-lg: 18px;
  --r-xl: 24px;
  --shadow: 0 2px 20px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 30px rgba(0,0,0,0.09);
}

/* ─── INTRO SCREEN ─── */
#intro {
  position: fixed; inset: 0; z-index: 1000;
  background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  overflow: hidden;
}
.intro-sky {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 38%;
  background: linear-gradient(to top, #e8f4fd 0%, #f0f8ff 40%, transparent 100%);
}
.road-wrap {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 56px;
}
.road {
  width: 100%; height: 100%;
  background: #e8e8ed;
  border-top: 2px solid #d1d1d6;
  position: relative; overflow: hidden;
}
.road-dashes {
  position: absolute; top: 50%; left: -100%;
  width: 300%; height: 3px;
  background: repeating-linear-gradient(
    to right,
    transparent 0, transparent 28px,
    #c7c7cc 28px, #c7c7cc 56px
  );
  transform: translateY(-50%);
  animation: dashMove 1.2s linear infinite;
}
@keyframes dashMove { from { transform: translateX(0) translateY(-50%); } to { transform: translateX(calc(84px)) translateY(-50%); } }

.bus-container {
  position: absolute; bottom: 56px; left: -160px;
  animation: busRide 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes busRide {
  0%   { left: -160px; }
  55%  { left: calc(50% - 64px); }
  70%  { left: calc(50% - 60px); }
  85%  { left: calc(50% - 64px); }
  100% { left: calc(50% - 64px); }
}
.bus-idle { animation: busIdle 1.8s ease-in-out infinite; animation-delay: 2.2s; }
@keyframes busIdle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
.wheel { animation: wheelSpin 0.25s linear infinite; transform-origin: center; }
@keyframes wheelSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.intro-content {
  position: relative; z-index: 2;
  text-align: center; margin-bottom: 140px;
  animation: introFadeUp 0.8s ease-out 0.3s both;
}
@keyframes introFadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.intro-logo { font-size: 13px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.intro-title { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; line-height: 1.1; color: var(--text); }
.intro-title span { color: var(--blue); }
.intro-sub { font-size: 15px; color: var(--text2); margin-top: 10px; font-weight: 300; letter-spacing: -0.2px; }

.intro-btn {
  position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%);
  z-index: 10; border: none; background: none; cursor: pointer; opacity: 0;
  animation: btnAppear 0.5s ease-out 2.6s forwards;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.bell-outer {
  width: 84px; height: 108px; border-radius: 42px / 54px;
  background: linear-gradient(160deg, #2a0000 0%, #1a0000 100%);
  box-shadow: 0 8px 28px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.08);
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 10px 8px 12px; position: relative; transition: transform 0.1s;
}
.bell-hole-top {
  width: 7px; height: 7px; border-radius: 50%;
  background: #0a0a0a; border: 1px solid #333;
  position: absolute; top: 7px; left: 50%; transform: translateX(-50%);
}
.bell-stop-window {
  width: 62px; height: 28px; border-radius: 14px;
  background: linear-gradient(135deg, #cc0000 0%, #ff1a1a 40%, #cc0000 100%);
  box-shadow: 0 0 10px rgba(255,30,30,0.6), inset 0 1px 3px rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  margin-top: 14px;
  animation: stopGlow 1.8s ease-in-out infinite; animation-delay: 3.2s;
}
.bell-stop-text {
  font-size: 11px; font-weight: 800; color: #ffcccc;
  letter-spacing: 2px; font-family: -apple-system, sans-serif;
}
.bell-push-btn {
  width: 46px; height: 38px; border-radius: 8px;
  background: linear-gradient(160deg, #e03030 0%, #b81c1c 100%);
  box-shadow: 0 4px 0 #7a0f0f, 0 5px 10px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.15);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  transition: transform 0.08s, box-shadow 0.08s; margin-bottom: 2px;
}
.bell-push-dot { width: 16px; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.4); }
.bell-hole-bot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #0a0a0a; border: 1px solid #333;
  position: absolute; bottom: 7px; left: 50%; transform: translateX(-50%);
}
.intro-btn:active .bell-outer { transform: scale(0.95); }
.intro-btn:active .bell-push-btn {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #7a0f0f, 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 2px rgba(0,0,0,0.2);
}
.bell-label {
  font-size: 12px; font-weight: 700; color: rgba(160,20,20,0.9);
  letter-spacing: 0.3px; background: rgba(255,255,255,0.9);
  padding: 4px 16px; border-radius: 100px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
@keyframes btnAppear { from { opacity: 0; } to { opacity: 1; } }
@keyframes stopGlow {
  0%, 100% { box-shadow: 0 0 10px rgba(255,30,30,0.6), inset 0 1px 3px rgba(255,255,255,0.15); }
  50% { box-shadow: 0 0 18px rgba(255,30,30,0.9), 0 0 6px rgba(255,30,30,0.4), inset 0 1px 3px rgba(255,255,255,0.15); }
}
#intro.exit { animation: introExit 0.55s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes introExit { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }

/* ─── MAIN APP ─── */
#app {
  display: none; flex-direction: column; min-height: 100vh;
  max-width: 430px; margin: 0 auto; background: var(--white);
  opacity: 0; transition: opacity 0.4s ease;
}
#app.visible { display: flex; }
#app.show { opacity: 1; }

/* ─── NAV BAR ─── */
.navbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 0.5px solid var(--border); padding: 12px 20px 0;
}
.nav-top { display: flex; align-items: center; margin-bottom: 12px; }
.nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
.nav-mini-bus { margin-left: 8px; font-size: 17px; }
.nav-tabs { display: flex; gap: 0; border-bottom: 1px solid transparent; }
.nav-tab {
  flex: 1; padding: 10px 0; border: none; background: none;
  font-family: inherit; font-size: 14px; font-weight: 500;
  color: var(--text3); cursor: pointer; position: relative; transition: color 0.2s;
}
.nav-tab.on { color: var(--blue); }
.nav-tab.on::after {
  content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
  height: 2px; background: var(--blue); border-radius: 2px;
}

/* ─── SCROLL AREA ─── */
.scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px 20px 48px; scrollbar-width: none;
}
.scroll::-webkit-scrollbar { display: none; }

.pane { display: none; }
.pane.on { display: block; }
.sec { margin-bottom: 28px; }
.sec-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 10px; text-transform: uppercase; }

/* ─── CLASS BUTTONS ─── */
.class-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.class-btn {
  padding: 14px 6px; border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--bg); cursor: pointer; text-align: center; transition: all 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.class-btn:active { transform: scale(0.96); }
.class-btn .cl { font-size: 13px; font-weight: 600; color: var(--text); display: block; }
.class-btn .ct { font-size: 11px; color: var(--text3); margin-top: 2px; display: block; font-variant-numeric: tabular-nums; }
.class-btn.on { background: var(--blue); border-color: var(--blue); }
.class-btn.on .cl, .class-btn.on .ct { color: #fff; }

input[type=time] {
  width: 100%; padding: 13px 16px; border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--bg); color: var(--text); font-family: inherit; font-size: 17px; font-weight: 500;
  outline: none; margin-top: 10px; transition: border-color 0.2s; color-scheme: light;
}
input[type=time]:focus { border-color: var(--blue); background: #fff; }

/* ─── STYLE PILLS ─── */
.cond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cond-pill {
  padding: 18px 14px; border-radius: var(--r-lg); border: 1px solid var(--border2);
  background: var(--bg); cursor: pointer; transition: all 0.18s; -webkit-tap-highlight-color: transparent;
}
.cond-pill:active { transform: scale(0.97); }
.cond-pill .ci { font-size: 26px; margin-bottom: 8px; }
.cond-pill .ct { font-size: 13px; font-weight: 600; color: var(--text); }
.cond-pill .cd { font-size: 11px; color: var(--text3); margin-top: 3px; }
.cond-pill.on { background: #fff; border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
.cond-pill.on .ct { color: var(--blue); }

/* ─── RANGE SLIDERS ─── */
.range-row { margin-bottom: 18px; padding: 0 4px; }
.range-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.range-name { font-size: 15px; font-weight: 500; color: var(--text); }
.range-val { font-size: 15px; font-weight: 600; color: var(--blue); font-variant-numeric: tabular-nums; }
input[type=range] {
  width: calc(100% - 24px); height: 4px; border-radius: 4px; -webkit-appearance: none; appearance: none;
  background: var(--bg); outline: none; cursor: pointer; display: block; margin: 0 12px;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 4px; border-radius: 4px;
  background: linear-gradient(to right, var(--blue) 0%, var(--blue) var(--pct,50%), #e5e5ea var(--pct,50%));
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: #fff; border: 0.5px solid rgba(0,0,0,0.15); box-shadow: 0 2px 8px rgba(0,0,0,0.18); margin-top: -9px; cursor: pointer;
}

.btn-gen {
  width: 100%; padding: 17px; border-radius: 100px; border: none; background: var(--blue); color: #fff;
  font-family: inherit; font-size: 17px; font-weight: 600; cursor: pointer; letter-spacing: -0.3px;
  transition: background 0.15s, transform 0.12s; box-shadow: 0 4px 20px rgba(0,113,227,0.28);
}
.btn-gen:active { transform: scale(0.98); background: #0062c3; }

/* ─── ROUTE DYNAMIC CARDS ─── */
.segment-block {
  background: #fff; border: 1px solid var(--border2); border-radius: var(--r-xl);
  padding: 18px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.03);
}
.segment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.segment-title { font-size: 14px; font-weight: 700; color: var(--text); }
.btn-seg-del {
  padding: 4px 10px; border-radius: 100px; border: none; background: var(--red-light);
  color: var(--red); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.route-card { background: var(--bg); border-radius: var(--r-lg); padding: 14px; margin-bottom: 12px; }
input[type=text] {
  width: 100%; padding: 12px 14px; border-radius: var(--r); border: 1px solid var(--border2);
  background: #fff; color: var(--text); font-family: inherit; font-size: 15px; outline: none; margin-bottom: 8px;
}
input[type=text]:last-of-type { margin-bottom: 0; }
input[type=text]:focus { border-color: var(--blue); }
textarea {
  width: 100%; padding: 12px 14px; border-radius: var(--r); border: 1px solid var(--border2);
  background: #fff; color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
  outline: none; resize: vertical; min-height: 80px; line-height: 1.8; margin-top: 6px;
}
textarea:focus { border-color: var(--blue); }

.bus-item { background: var(--bg2); border: 1px dashed var(--border2); border-radius: var(--r); padding: 12px; margin-bottom: 10px; }
.bus-item-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.bus-item-row input[type=text] { margin-bottom: 0; flex: 1; }
.btn-del { padding: 8px 12px; border-radius: 8px; border: none; background: rgba(255,59,48,0.08); color: var(--red); font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-add {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 11px; border-radius: var(--r); border: 1.5px dashed rgba(0,113,227,0.25);
  background: transparent; color: var(--blue); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px;
}
.btn-add-segment {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 16px; border-radius: var(--r-lg); border: 2px dashed var(--blue);
  background: var(--blue-light); color: var(--blue); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px;
  box-shadow: 0 4px 14px rgba(0,113,227,0.1); transition: transform 0.1s;
}
.btn-add-segment:active { transform: scale(0.99); }

/* ─── TIMETABLE VIEW ─── */
.tt-card { background: #fff; border: 1px solid var(--border2); border-radius: var(--r-xl); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
.tt-seg-title { font-size: 13px; font-weight: 700; color: var(--blue); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.tt-station { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.tt-bus-box { background: var(--bg); border-radius: var(--r); padding: 12px; margin-bottom: 8px; }
.tt-bus-box:last-child { margin-bottom: 0; }
.tt-bus-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.tt-bus-name { font-size: 16px; font-weight: 700; color: var(--text); }
.tt-bus-dur { font-size: 12px; color: var(--text2); }
.tt-times-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.tt-time-tag { background: #fff; border: 0.5px solid var(--border2); border-radius: 6px; padding: 4px 8px; font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; color: var(--text); }

/* ─── RESULT CARDS ─── */
#result-area { margin-top: 24px; }
.r-hero { background: var(--text); border-radius: var(--r-xl); padding: 28px 26px; margin-bottom: 14px; position: relative; overflow: hidden; }
.r-hero-sky { position: absolute; inset: 0; z-index: 0; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
.r-hero-sky::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 55%, rgba(255,255,255,0.4) 0%, transparent 100%);
}
.r-hero-content { position: relative; z-index: 1; }
.r-hero-eye { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
.r-hero-time { font-size: 72px; font-weight: 700; letter-spacing: -4px; line-height: 0.92; color: #fff; margin-bottom: 12px; font-variant-numeric: tabular-nums; }
.r-hero-desc { font-size: 14px; color: rgba(255,255,255,0.5); }
.r-hero-desc strong { color: rgba(255,255,255,0.8); font-weight: 600; }

.r-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.r-stat { background: var(--bg); border-radius: var(--r-lg); padding: 18px 16px; }
.r-stat-eye { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; }
.r-stat-num { font-size: 36px; font-weight: 700; letter-spacing: -2px; line-height: 1; font-variant-numeric: tabular-nums; }
.r-stat-num.blue { color: var(--blue); }
.r-stat-unit { font-size: 15px; font-weight: 500; color: var(--text3); }
.r-stat-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }

.r-bus { background: #fff; border: 1px solid var(--border2); border-radius: var(--r-xl); padding: 20px; margin-bottom: 10px; box-shadow: var(--shadow); }
.r-bus-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.r-bus-badge { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; background: var(--blue-light); color: var(--blue); }
.r-bus-body { display: flex; align-items: flex-end; gap: 12px; }
.r-bus-num { font-size: 52px; font-weight: 700; letter-spacing: -3px; color: var(--text); line-height: 1; }
.r-bus-num-unit { font-size: 18px; color: var(--text3); font-weight: 400; margin-left: 6px; }
.r-bus-dep { margin-left: auto; text-align: right; }
.r-bus-dep-time { font-size: 28px; font-weight: 700; letter-spacing: -1.5px; color: var(--blue); font-variant-numeric: tabular-nums; }
.r-bus-dep-label { font-size: 12px; color: var(--text3); margin-top: 3px; }
.r-bus-route { display: flex; align-items: center; gap: 8px; padding-top: 14px; margin-top: 2px; border-top: 0.5px solid var(--border); font-size: 13px; color: var(--text2); }
.r-bus-route .stop { font-weight: 600; color: var(--text); }
.r-bus-route .arr { margin-left: auto; font-size: 12px; color: var(--text3); font-variant-numeric: tabular-nums; background: var(--bg); padding: 3px 10px; border-radius: 100px; }

.r-summary { background: var(--bg); border-radius: var(--r-xl); padding: 20px; margin-bottom: 10px; }
.r-summary-eye { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.r-sum-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; color: var(--text2); }
.r-sum-item:last-child { border-bottom: none; padding-bottom: 0; }
.r-sum-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--blue); }
.r-sum-dot.green { background: var(--green); }
.r-sum-dot.amber { background: var(--amber); }

.r-detail { background: #fff; border: 1px solid var(--border2); border-radius: var(--r-xl); overflow: hidden; margin-bottom: 10px; }
.r-detail-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 18px 20px; border: none; background: none; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; }
.r-detail-chevron { width: 22px; height: 22px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text3); transition: transform 0.25s; }
.r-detail-btn.open .r-detail-chevron { transform: rotate(180deg); }
.r-detail-body { display: none; padding: 0 20px 18px; }
.r-detail-body.open { display: block; }
.tl-item { display: flex; gap: 16px; padding: 10px 0; border-bottom: 0.5px solid var(--border); align-items: flex-start; }
.tl-item:last-child { border-bottom: none; }
.tl-time { font-size: 13px; font-weight: 600; color: var(--blue); min-width: 44px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.tl-desc { font-size: 13px; color: var(--text2); }

.anim { animation: fadeUp 0.4s ease-out both; }
.d1 { animation-delay: 0.04s; } .d2 { animation-delay: 0.1s; } .d3 { animation-delay: 0.16s; } .d4 { animation-delay: 0.22s; } .d5 { animation-delay: 0.28s; } .d6 { animation-delay: 0.34s; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.empty { text-align: center; padding: 44px 20px; }
.empty-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.empty-desc { font-size: 14px; color: var(--text3); line-height: 1.6; }

/* ─── FAB ─── */
#ai-fab {
  position: fixed; bottom: 28px; right: 20px; z-index: 200;
  width: 56px; height: 56px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #0071e3, #005bb5);
  box-shadow: 0 4px 20px rgba(0,113,227,0.4);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#ai-fab.visible { display: flex; }
#ai-fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(0,113,227,0.3); }
.fab-icon { font-size: 22px; line-height: 1; }

/* ─── AI CHAT SHEET ─── */
#ai-sheet {
  position: fixed; inset: 0; z-index: 300;
  display: none; flex-direction: column;
}
#ai-sheet.open { display: flex; }
.sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
  animation: bdIn 0.25s ease;
}
@keyframes bdIn { from { opacity: 0; } to { opacity: 1; } }
.sheet-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  max-width: 430px; margin: 0 auto;
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 16px);
  max-height: 92vh; display: flex; flex-direction: column;
  animation: sheetUp 0.32s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 12px auto 0;
}
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
  border-bottom: 0.5px solid var(--border);
}
.sheet-title-wrap { display: flex; align-items: center; gap: 10px; }
.sheet-title-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg,#0071e3,#005bb5);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.sheet-title { font-size: 16px; font-weight: 700; color: var(--text); }
.sheet-close {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: var(--bg); color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* chat messages */
.chat-scroll {
  flex: 1; overflow-y: auto; padding: 16px 16px 4px;
  scrollbar-width: none; display: flex; flex-direction: column; gap: 10px;
}
.chat-scroll::-webkit-scrollbar { display: none; }
.chat-msg {
  max-width: 82%; padding: 11px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; animation: msgIn 0.2s ease-out;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.chat-msg.user {
  align-self: flex-end; background: var(--blue); color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start; background: var(--bg);
  color: var(--text); border-bottom-left-radius: 4px;
}
.chat-msg.ai.loading { color: var(--text3); font-style: italic; }
.chat-typing { display: flex; gap: 4px; align-items: center; padding: 13px 16px; }
.chat-typing span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text3);
  animation: dot 1.2s infinite;
}
.chat-typing span:nth-child(2) { animation-delay: 0.2s; }
.chat-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* 정류장 선택 영역 */
.chat-stop-row {
  padding: 10px 16px 0;
  display: flex; align-items: center; gap: 8px;
  border-top: 0.5px solid var(--border);
}
.chat-stop-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  white-space: nowrap; flex-shrink: 0;
}
.chat-stop-sel {
  flex: 1; padding: 8px 10px; border-radius: 10px;
  border: 1px solid var(--border2); background: var(--bg);
  color: var(--text); font-family: inherit; font-size: 13px;
  outline: none; -webkit-appearance: none; appearance: none;
}
.chat-stop-sel:focus { border-color: var(--blue); background: #fff; }
.chat-stop-sel.unset { color: var(--red); border-color: var(--red); background: var(--red-light); }

/* preset question chips */
.chat-presets {
  padding: 10px 16px 14px; display: flex; flex-direction: column; gap: 7px;
}
.preset-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px;
}
.preset-chip {
  padding: 11px 14px; border-radius: 12px; border: 1px solid var(--border2);
  background: #fff; color: var(--text); font-size: 13.5px; font-weight: 500;
  cursor: pointer; text-align: left; font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  -webkit-tap-highlight-color: transparent;
}
.preset-chip:active { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
.preset-chip .chip-icon { margin-right: 8px; }

/* ─── CROWDING LOG SHEET ─── */
#log-sheet {
  position: fixed; inset: 0; z-index: 400;
  display: none; flex-direction: column;
}
#log-sheet.open { display: flex; }
.log-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  max-width: 430px; margin: 0 auto;
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 20px);
  max-height: 85vh; display: flex; flex-direction: column;
  animation: sheetUp 0.32s cubic-bezier(0.32,0.72,0,1);
}
.log-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px; border-bottom: 0.5px solid var(--border);
}
.log-title { font-size: 16px; font-weight: 700; color: var(--text); }
.log-scroll { flex: 1; overflow-y: auto; padding: 18px 20px; scrollbar-width: none; }
.log-scroll::-webkit-scrollbar { display: none; }
.log-field { margin-bottom: 20px; }
.log-field-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 8px;
}
.log-select {
  width: 100%; padding: 12px 14px; border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--bg); color: var(--text); font-family: inherit; font-size: 15px;
  outline: none; -webkit-appearance: none; appearance: none;
}
.log-select:focus { border-color: var(--blue); background: #fff; }
.crowd-btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.crowd-btn {
  padding: 16px 8px; border-radius: var(--r-lg); border: 1px solid var(--border2);
  background: var(--bg); cursor: pointer; text-align: center; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.crowd-btn .crow-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.crowd-btn .crow-lbl { font-size: 13px; font-weight: 600; color: var(--text); }
.crowd-btn.on.few { background: var(--green-light); border-color: var(--green); }
.crowd-btn.on.few .crow-lbl { color: var(--green); }
.crowd-btn.on.mid { background: var(--amber-light); border-color: var(--amber); }
.crowd-btn.on.mid .crow-lbl { color: var(--amber); }
.crowd-btn.on.many { background: var(--red-light); border-color: var(--red); }
.crowd-btn.on.many .crow-lbl { color: var(--red); }

/* recent log list */
.log-history { margin-top: 6px; }
.log-history-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px;
}
.log-entry {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 0.5px solid var(--border);
  font-size: 13px;
}
.log-entry:last-child { border-bottom: none; }
.log-entry-bus {
  background: var(--blue-light); color: var(--blue);
  padding: 3px 10px; border-radius: 100px; font-weight: 700; font-size: 12px; flex-shrink: 0;
}
.log-entry-info { flex: 1; color: var(--text2); }
.log-entry-crowd { font-size: 16px; flex-shrink: 0; }
.btn-log-save {
  margin: 0 20px 8px; padding: 16px; border-radius: 100px; border: none;
  background: var(--blue); color: #fff; font-family: inherit; font-size: 16px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn-log-save:active { background: #0062c3; }
</style>
</head>
<body>

<div id="intro">
  <div class="intro-sky"></div>
  <div class="intro-content">
    <div class="intro-logo">Commute Planner</div>
    <div class="intro-title">버스타고<br><span>통학하자</span></div>
    <div class="intro-sub">스마트한 등교 루틴 도우미</div>
  </div>
  <div class="road-wrap"><div class="road"><div class="road-dashes"></div></div></div>
  <div class="bus-container" id="busContainer">
    <div class="bus-idle" id="busIdle">
      <svg width="128" height="64" viewBox="0 0 128 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="10" width="116" height="42" rx="8" fill="#0071e3"/>
        <rect x="12" y="6" width="104" height="12" rx="6" fill="#005bb5"/>
        <rect x="16" y="16" width="18" height="14" rx="3" fill="#e8f4ff" opacity="0.9"/>
        <rect x="40" y="16" width="18" height="14" rx="3" fill="#e8f4ff" opacity="0.9"/>
        <rect x="64" y="16" width="18" height="14" rx="3" fill="#e8f4ff" opacity="0.9"/>
        <rect x="88" y="16" width="18" height="14" rx="3" fill="#e8f4ff" opacity="0.9"/>
        <rect x="88" y="30" width="22" height="18" rx="3" fill="#005bb5"/>
        <rect x="6" y="30" width="8" height="10" rx="2" fill="#ffd60a"/>
        <rect x="16" y="33" width="56" height="10" rx="2" fill="#1a1a2e"/>
        <text x="44" y="41" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="6" font-weight="600" fill="#ffd60a">대학교 방면</text>
        <rect x="6" y="50" width="116" height="6" fill="#004b9e"/>
        <g class="wheel" style="transform-origin: 26px 56px"><circle cx="26" cy="56" r="8" fill="#1c1c1e"/><circle cx="26" cy="56" r="5" fill="#3a3a3c"/></g>
        <g class="wheel" style="transform-origin: 102px 56px"><circle cx="102" cy="56" r="8" fill="#1c1c1e"/><circle cx="102" cy="56" r="5" fill="#3a3a3c"/></g>
      </svg>
    </div>
  </div>
  <button class="intro-btn" id="startBtn" onclick="startApp()">
    <div class="bell-outer">
      <div class="bell-hole-top"></div>
      <div class="bell-stop-window"><span class="bell-stop-text">STOP</span></div>
      <div class="bell-push-btn">
        <div class="bell-push-dot"></div>
        <div class="bell-push-dot"></div>
      </div>
      <div class="bell-hole-bot"></div>
    </div>
    <span class="bell-label">하차벨 누르기</span>
  </button>
</div>

<div id="app">
  <nav class="navbar">
    <div class="nav-top">
      <div class="nav-title">버스타고 통학하자</div>
      <div class="nav-mini-bus">🚌</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab on" id="ntab-setup" onclick="switchTab('setup')">메인</button>
      <button class="nav-tab" id="ntab-timetable" onclick="switchTab('timetable')">시간표</button>
      <button class="nav-tab" id="ntab-route" onclick="switchTab('route')">노선설정</button>
    </div>
  </nav>

  <div class="scroll">

    <div class="pane on" id="pane-setup">
      <div class="sec">
        <div class="sec-label">첫 수업</div>
        <div class="class-grid" id="class-grid"></div>
        <div id="custom-row" style="display:none"><input type="time" id="custom-time" value="09:00"></div>
      </div>

      <div class="sec">
        <div class="sec-label">등교 스타일</div>
        <div class="cond-grid" id="cond-grid"></div>
      </div>

      <div class="sec">
        <div class="sec-label">루틴 설정</div>
        <div class="range-row">
          <div class="range-head"><span class="range-name">준비 시간</span><span class="range-val" id="v-prep">60분</span></div>
          <input type="range" id="r-prep" min="15" max="120" step="5" value="60" oninput="sv('prep',this)">
        </div>
        <div class="range-row">
          <div class="range-head"><span class="range-name">정류장까지 도보</span><span class="range-val" id="v-walk">10분</span></div>
          <input type="range" id="r-walk" min="1" max="30" step="1" value="10" oninput="sv('walk',this)">
        </div>
      </div>

      <button class="btn-gen" onclick="generate()">루틴 생성하기</button>
      <div id="result-area"></div>
    </div>

    <div class="pane" id="pane-timetable">
      <div id="timetable-area"></div>
    </div>

    <div class="pane" id="pane-route">
      <div id="segments-container"></div>
      <button class="btn-add-segment" onclick="addSegment()">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        + 환승 구간 추가
      </button>
    </div>

  </div>
</div>

<script>
/* ─── DYNAMIC STATE ─── */
const S = {
  prep: 60, walk: 10, classId: '1', condition: 'relax',
  // 구간(Segment) 목록을 배열로 동적 관리!
  segments: [
    {
      id: 1,
      board: '강동동', exit: '학성공원',
      buses: [
        { id: 101, number: '5003', duration: 30, times: '06:03\n06:42\n07:21\n08:01\n08:42\n09:22\n10:01' },
        { id: 102, number: '742', duration: 44, times: '06:17\n06:38\n07:09\n07:41\n08:07\n08:41\n09:08' }
      ]
    },
    {
      id: 2,
      board: '학성공원', exit: '울산대학교',
      buses: [
        { id: 201, number: '417', duration: 22, times: '06:03\n06:35\n07:15\n07:36\n08:11\n08:54\n09:28' },
        { id: 202, number: '114', duration: 25, times: '07:31\n07:45\n07:58\n08:09\n08:17\n08:27\n08:41\n08:59\n09:13\n09:23\n09:36\n09:56\n10:05\n10:31\n10:33' },
        { id: 203, number: '422', duration: 29, times: '07:01\n07:40\n07:59\n08:15\n08:31\n08:52\n09:09\n09:34\n09:49\n10:01\n10:16\n10:39' }
      ]
    }
  ]
};

const CLASSES = [
  { id:'1', label:'1교시', time:'09:00' },
  { id:'2', label:'2교시', time:'10:00' },
  { id:'3', label:'3교시', time:'11:00' },
  { id:'custom', label:'직접', time:null }
];
const CONDS = [
  { id:'sleep', icon:'😴', label:'잠 우선형', desc:'최대한 늦게' },
  { id:'relax', icon:'☕', label:'여유 추구형', desc:'천천히 준비' },
  { id:'fast', icon:'⚡', label:'효율 중심형', desc:'최단 루트' },
  { id:'strict', icon:'📚', label:'안정 지향형', desc:'무조건 정시' }
];

let globalId = 500;
const uid = () => globalId++;
const pt = s => { const [h,m] = s.trim().split(':').map(Number); return h*60+m; };
const ft = m => `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;

function startApp() {
  const intro = document.getElementById('intro');
  const app = document.getElementById('app');
  intro.classList.add('exit');
  app.classList.add('visible');
  setTimeout(() => { app.classList.add('show'); }, 60);
  setTimeout(() => { intro.style.display = 'none'; }, 600);
}

/* ─── TABS ─── */
function switchTab(tab) {
  document.getElementById('pane-setup').classList.toggle('on', tab==='setup');
  document.getElementById('pane-timetable').classList.toggle('on', tab==='timetable');
  document.getElementById('pane-route').classList.toggle('on', tab==='route');
  
  document.getElementById('ntab-setup').classList.toggle('on', tab==='setup');
  document.getElementById('ntab-timetable').classList.toggle('on', tab==='timetable');
  document.getElementById('ntab-route').classList.toggle('on', tab==='route');
  
  if (tab === 'route') renderSegments();
  if (tab === 'timetable') renderTimetablePane();
}

/* ─── RANGE SLIDERS ─── */
function sv(key, el) {
  S[key] = parseFloat(el.value);
  document.getElementById('v-'+key).textContent = el.value + '분';
  const min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
  el.style.setProperty('--pct', ((val-min)/(max-min)*100)+'%');
}
['prep','walk'].forEach(k => {
  const el = document.getElementById('r-'+k);
  const min=parseFloat(el.min), max=parseFloat(el.max), val=parseFloat(el.value);
  el.style.setProperty('--pct', ((val-min)/(max-min)*100)+'%');
});

/* ─── DYNAMIC SEGMENTS & BUSES MANAGEMENT ─── */
function addSegment() {
  const nextId = S.segments.length > 0 ? Math.max(...S.segments.map(s=>s.id)) + 1 : 1;
  // 앞 구간의 하차역을 자동 승차역 권장값으로 지정
  const prevExit = S.segments.length > 0 ? S.segments[S.segments.length-1].exit : '';
  S.segments.push({
    id: nextId,
    board: prevExit,
    exit: '',
    buses: [{ id: uid(), number: '', duration: 20, times: '' }]
  });
  renderSegments();
}

function delSegment(segId) {
  S.segments = S.segments.filter(s => s.id !== segId);
  renderSegments();
}

function updSegmentStation(segId, key, val) {
  const seg = S.segments.find(s => s.id === segId);
  if (seg) seg[key] = val;
}

function addBusToSeg(segId) {
  const seg = S.segments.find(s => s.id === segId);
  if (seg) {
    seg.buses.push({ id: uid(), number: '', duration: 20, times: '' });
    renderSegments();
  }
}

function delBusFromSeg(segId, busId) {
  const seg = S.segments.find(s => s.id === segId);
  if (seg) {
    seg.buses = seg.buses.filter(b => b.id !== busId);
    renderSegments();
  }
}

function updBusInSeg(segId, busId, key, val) {
  const seg = S.segments.find(s => s.id === segId);
  if (seg) {
    const b = seg.buses.find(b => b.id === busId);
    if (b) b[key] = val;
  }
}

/* 노선설정 화면 렌더링 */
function renderSegments() {
  const container = document.getElementById('segments-container');
  if (S.segments.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-title">구간이 없습니다.</div>
        <div class="empty-desc">아래 버튼을 눌러 첫 번째 이동 구간을 추가해 주세요.</div>
      </div>`;
    return;
  }

  container.innerHTML = S.segments.map((seg, index) => `
    <div class="segment-block">
      <div class="segment-header">
        <span class="segment-title">${index + 1}구간 — ${index === 0 ? '집 출발' : '환승 구간'}</span>
        <button class="btn-seg-del" onclick="delSegment(${seg.id})">구간 삭제</button>
      </div>
      <div class="route-card">
        <input type="text" placeholder="승차 정류장" value="${seg.board}" oninput="updSegmentStation(${seg.id}, 'board', this.value)">
        <input type="text" placeholder="하차 정류장" value="${seg.exit}" oninput="updSegmentStation(${seg.id}, 'exit', this.value)">
      </div>
      <div id="buses-inside-${seg.id}">
        ${seg.buses.map(b => `
          <div class="bus-item">
            <div class="bus-item-row">
              <input type="text" placeholder="버스 번호" value="${b.number}" oninput="updBusInSeg(${seg.id}, ${b.id}, 'number', this.value)">
              <button class="btn-del" onclick="delBusFromSeg(${seg.id}, ${b.id})">삭제</button>
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 8px; align-items: center;">
              <span style="font-size: 12px; color: var(--text2);">소요 시간(분):</span>
              <input type="number" style="width: 65px; padding: 5px; border-radius: 6px; border: 1px solid var(--border2);" value="${b.duration}" oninput="updBusInSeg(${seg.id}, ${b.id}, 'duration', this.value)">
            </div>

/* ─── MULTI-SEGMENT ROUTINE BACKWARDS COMPUTE ─── */
function compute(ct) {
  if (S.segments.length === 0) return null;
  
  let prep = S.prep;
  let buf = 15;
  if (S.condition === 'relax') prep += 15;
  if (S.condition === 'fast') { prep -= 10; buf = 5; }
  if (S.condition === 'strict') buf = 20;

  const classMin = pt(ct);
  let currentGoal = classMin - buf; 
  
  let chosenRoute = [];

  // 마지막 구간부터 역순으로 탐색하는 동적 계획 알고리즘 역추적
  for (let i = S.segments.length - 1; i >= 0; i--) {
    const seg = S.segments[i];
    let bestBusOption = null;

    seg.buses.forEach(bus => {
      const times = bus.times.split('\n').map(t=>t.trim()).filter(Boolean);
      times.forEach(t => {
        const dep = pt(t);
        const arr = dep + Number(bus.duration);
        
        // 목표 시간보다 일찍 도착하고, 그 중 가장 늦게 출발하는 버스 채택
        if (arr <= currentGoal) {
          if (!bestBusOption || dep > bestBusOption.dep) {
            bestBusOption = { dep, arr, bus, seg, segIndex: i };
          }
        }
      });
    });

    if (!bestBusOption) return null; // 중간 구간 체인이 끊어지면 실패 처리
    chosenRoute.unshift(bestBusOption);
    
    // 다음 상위 구간의 도착 목표 시간 설정 (최소 환승/대기 버퍼 5분 확보)
    currentGoal = bestBusOption.dep - 5; 
  }

  const leave = chosenRoute[0].dep - S.walk;
  return {
    wakeUp: leave - prep,
    leaveHome: leave,
    route: chosenRoute,
    classMin: classMin,
    arrival: chosenRoute[chosenRoute.length - 1].arr
  };
}

/* ─── 모든 버스 목록 수집 ─── */
function getAllBuses() {
  const buses = [];
  S.segments.forEach(seg => {
    seg.buses.forEach(b => {
      if (b.number) buses.push({ number: b.number, segBoard: seg.board, segExit: seg.exit });
    });

}

/* ─── 현재 선택된 정류장 ─── */
let currentStop = '';

function getAllStops() {
  const stops = new Set();
  S.segments.forEach(seg => { if (seg.board) stops.add(seg.board); if (seg.exit) stops.add(seg.exit); });
  return [...stops];
}

function populateChatStopSel() {
  const sel = document.getElementById('chat-stop-sel');
  const stops = getAllStops();
  sel.innerHTML = '<option value="">정류장 선택</option>' +
    stops.map(s => `<option value="${s}"${s === currentStop ? ' selected' : ''}>${s}</option>`).join('');
  sel.className = 'chat-stop-sel' + (currentStop ? '' : ' unset');
}

function onStopChange(sel) {
  currentStop = sel.value;
  sel.className = 'chat-stop-sel' + (currentStop ? '' : ' unset');
}

/* ─── 현재 시각 기준 다음 버스 (정류장 필터 포함) ─── */
function getNextBuses() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const results = [];
  S.segments.forEach((seg, si) => {
    // 현재 정류장이 선택됐으면 해당 구간의 승차 정류장과 일치하는 것만
    if (currentStop && seg.board !== currentStop) return;
    seg.buses.forEach(b => {
      if (!b.number) return;
      const times = b.times.split('\n').map(t => t.trim()).filter(Boolean);
      const next = times.map(t => pt(t)).filter(m => m >= nowMin).sort((a,z) => a-z)[0];
      if (next !== undefined) {
        results.push({ number: b.number, dep: next, duration: Number(b.duration), seg, segIdx: si });
      }
    });
  });
  return results.sort((a,b) => a.dep - b.dep);
}

/* ─── 혼잡도 분석 ─── */
function analyzeCrowd(busNumber) {
  const recent = crowdLogs.filter(l => l.bus === busNumber).slice(-10);
  if (!recent.length) return null;
  const counts = { few: 0, mid: 0, many: 0 };
  recent.forEach(l => counts[l.crowd]++);
  const dominant = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  return { counts, total: recent.length, dominant: dominant[0], recent };
}

function analyzeCrowdByHour(busNumber) {
  const now = new Date();
  const hour = now.getHours();
  const relevant = crowdLogs.filter(l => {
    if (l.bus !== busNumber) return false;
    const h = new Date(l.datetime).getHours();
    return Math.abs(h - hour) <= 1;
  });
  if (!relevant.length) return null;
  const counts = { few: 0, mid: 0, many: 0 };
  relevant.forEach(l => counts[l.crowd]++);
  const dominant = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  return { counts, total: relevant.length, dominant: dominant[0] };
}

/* ─── AI 답변 생성 ─── */
async function getAIAnswer(questionId) {
  // 혼잡도 질문은 정류장 불필요
  if (questionId !== 'least-crowd' && !currentStop) {
    const sel = document.getElementById('chat-stop-sel');
    sel.classList.add('unset');
    sel.focus();
    addChatMsg('ai', '📍 먼저 현재 정류장을 선택해 주세요!');
    return;
  }

  const chatScroll = document.getElementById('chat-scroll');
  const presets = document.getElementById('chat-presets');
  const QUESTION_LABELS = {
    'next-bus': '⏱ 지금 기준 가장 빨리 오는 버스는?',
    'least-time': '🚀 탑승 시간이 가장 짧은 버스는?',
    'least-crowd': '🧍 사람이 가장 적은 버스는?'
  };
  addChatMsg('user', QUESTION_LABELS[questionId]);
  presets.style.display = 'none';

  const loadId = 'load-' + Date.now();
  chatScroll.insertAdjacentHTML('beforeend', `
    <div class="chat-msg ai" id="${loadId}" style="padding:0">
      <div class="chat-typing"><span></span><span></span><span></span></div>
    </div>`);
  chatScroll.scrollTop = chatScroll.scrollHeight;

  const nextBuses = getNextBuses();
  const allBuses = getAllBuses();
  const nowStr = (() => { const n = new Date(); return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0'); })();
  const stopCtx = currentStop ? `사용자의 현재 정류장: ${currentStop}` : '';
  let prompt = '';

  if (questionId === 'next-bus') {
    const top = nextBuses.slice(0, 4).map(b =>
      '- ' + b.number + '번 버스 (' + b.seg.board + '→' + b.seg.exit + '): ' + ft(b.dep) + ' 출발, ' + b.duration + '분 소요'
    ).join('\n');
    prompt = '현재 시각: ' + nowStr + '\n' + stopCtx + '\n탑승 가능한 버스 시간표:\n' + (top || '해당 정류장에서 탈 수 있는 버스가 없음') + '\n\n지금 가장 빨리 탈 수 있는 버스를 알려주세요. 친근한 말투로 2~3문장, 이모지 1~2개 사용.';
  } else if (questionId === 'least-time') {
    const sorted = [...nextBuses].sort((a,b) => a.duration - b.duration).slice(0, 4);
    const info = sorted.map(b => '- ' + b.number + '번: 소요 ' + b.duration + '분 (' + ft(b.dep) + ' 출발, ' + b.seg.board + '→' + b.seg.exit + ')').join('\n');
    prompt = '현재 시각: ' + nowStr + '\n' + stopCtx + '\n탑승 가능한 버스 소요시간 데이터:\n' + (info || '해당 정류장에서 탈 수 있는 버스가 없음') + '\n\n탑승 시간이 가장 짧은 버스를 추천해주세요. 친근한 말투로 2~3문장, 이모지 1~2개 사용.';
  } else if (questionId === 'least-crowd') {
    const crowdSummary = allBuses.map(b => {
      const a = analyzeCrowdByHour(b.number) || analyzeCrowd(b.number);
      if (!a) return '- ' + b.number + '번: 기록 없음';
      const emoji = { few: '🟢 여유', mid: '🟡 보통', many: '🔴 혼잡' };
      return '- ' + b.number + '번: 최근 ' + a.total + '회 기록 → 주로 ' + emoji[a.dominant];
    }).join('\n');
    prompt = '사용자가 기록한 혼잡도 데이터:\n' + (crowdSummary || '기록 없음') + '\n\n사람이 가장 적은 버스를 알려주세요. 기록 없으면 솔직히 말해주세요. 친근한 말투로 2~3문장, 이모지 1~2개 사용.';
  }

  let answer = '';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: '당신은 버스 통학 앱의 친근한 AI 어시스턴트입니다. 사용자의 등교 버스 데이터를 분석해 도움이 되는 정보를 제공합니다. 항상 한국어로, 친근하고 간결하게 답변하세요.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    answer = (data.content || []).map(c => c.text || '').join('') || '답변을 받지 못했어요.';
  } catch(e) {
    answer = '네트워크 오류가 발생했어요. 잠시 후 다시 시도해 주세요.';
  }

  document.getElementById(loadId)?.remove();
  addChatMsg('ai', answer);

  if (questionId === 'least-crowd') {
    chatScroll.insertAdjacentHTML('beforeend', `
      <div style="padding:4px 0 8px">
        <button onclick="openLogSheet()" style="padding:10px 18px;border-radius:100px;border:1px solid var(--blue);background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">✏️ 혼잡도 직접 기록하기</button>
      </div>`);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  setTimeout(() => {
    chatScroll.insertAdjacentHTML('beforeend', `
      <div style="padding:4px 0 8px">
        <button onclick="resetChatPresets()" style="padding:10px 18px;border-radius:100px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;">다른 질문하기</button>
      </div>`);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }, 300);
}

  const buses = getAllBuses();
  sel.innerHTML = buses.length
    ? '<option value="">버스를 선택하세요</option>' + buses.map(b => '<option value="'+b.number+'">'+b.number+'번 ('+b.segBoard+'→'+b.segExit+')</option>').join('')
    : '<option value="">등록된 버스가 없습니다</option>';
  document.querySelectorAll('.crowd-btn').forEach(b => b.classList.remove('on'));
  logState.crowd = '';
  renderLogHistory();
  document.getElementById('log-sheet').classList.add('open');
}

function closeLogSheet() { document.getElementById('log-sheet').classList.remove('open'); }

function selCrowd(level) {
  logState.crowd = level;
  document.querySelectorAll('.crowd-btn').forEach(b => b.classList.toggle('on', b.dataset.level === level));
}

function saveLog() {
  const dt = document.getElementById('log-datetime').value;
  const bus = document.getElementById('log-bus-sel').value;
  if (!dt || !bus || !logState.crowd) { alert('날짜/시간, 버스, 혼잡도를 모두 선택해 주세요.'); return; }
  crowdLogs.push({ datetime: dt, bus, crowd: logState.crowd, savedAt: Date.now() });
  saveLogs();
  renderLogHistory();
  logState.crowd = '';
  document.querySelectorAll('.crowd-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('log-bus-sel').value = '';
  const btn = document.querySelector('.btn-log-save');
  btn.textContent = '✓ 저장됐어요!';
  btn.style.background = 'var(--green)';
  setTimeout(() => { btn.textContent = '기록 저장하기'; btn.style.background = ''; }, 1500);
}

function renderLogHistory() {
  const area = document.getElementById('log-history-list');
  const recent = [...crowdLogs].reverse().slice(0, 10);
  if (!recent.length) {
    area.innerHTML = '<div style="font-size:13px;color:var(--text3);text-align:center;padding:16px 0">아직 기록이 없어요</div>';
    return;
  }
  const crowdEmoji = { few: '🟢', mid: '🟡', many: '🔴' };
  const crowdLabel = { few: '여유', mid: '보통', many: '혼잡' };
  area.innerHTML = recent.map(l => {
    const d = new Date(l.datetime);
    const label = (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="log-entry"><span class="log-entry-bus">'+l.bus+'번</span><span class="log-entry-info">'+label+'</span><span class="log-entry-crowd">'+crowdEmoji[l.crowd]+' '+crowdLabel[l.crowd]+'</span></div>';
  }).join('');
}

/* ─── 앱 시작 시 FAB 표시 ─── */
const _origStartApp = startApp;
startApp = function() {
  _origStartApp();
  setTimeout(() => document.getElementById('ai-fab').classList.add('visible'), 700);
};
</script>

<!-- FAB 버튼 -->
<button id="ai-fab" onclick="openAIChat()" aria-label="AI 어시스턴트">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
    <path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98.97 4.29L2 22l5.71-.97C9.02 21.64 10.46 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="rgba(255,255,255,0.25)"/>
    <circle cx="8" cy="12" r="1.5" fill="white"/>
    <circle cx="12" cy="12" r="1.5" fill="white"/>
    <circle cx="16" cy="12" r="1.5" fill="white"/>
  </svg>
</button>

<!-- AI 채팅 시트 -->
<div id="ai-sheet">
  <div class="sheet-backdrop" onclick="closeAIChat()"></div>
  <div class="sheet-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title-wrap">
        <div class="sheet-title-icon">🤖</div>
        <span class="sheet-title">AI 버스 어시스턴트</span>
      </div>
      <button class="sheet-close" onclick="closeAIChat()">✕</button>
    </div>
    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-msg ai">안녕하세요! 버스 관련해서 궁금한 게 있으면 아래에서 선택해 주세요 🚌</div>
    </div>
    <div class="chat-stop-row">
      <span class="chat-stop-label">📍 현재 정류장</span>
      <select id="chat-stop-sel" class="chat-stop-sel unset" onchange="onStopChange(this)">
        <option value="">정류장 선택</option>
      </select>
    </div>
    <div class="chat-presets" id="chat-presets">
      <div class="preset-label">질문 선택</div>
      <button class="preset-chip" onclick="getAIAnswer('next-bus')"><span class="chip-icon">⏱</span>지금 기준 가장 빨리 오는 버스가 뭐야?</button>
      <button class="preset-chip" onclick="getAIAnswer('least-time')"><span class="chip-icon">🚀</span>탑승 시간이 가장 짧은 버스가 뭐야?</button>
      <button class="preset-chip" onclick="getAIAnswer('least-crowd')"><span class="chip-icon">🧍</span>사람이 가장 적은 버스가 뭐야?</button>
      <button class="preset-chip" onclick="openLogSheet(); closeAIChat();" style="border-color:var(--green);color:var(--green)"><span class="chip-icon">✏️</span>오늘 탄 버스 혼잡도 기록하기</button>
    </div>
  </div>
</div>

<!-- 혼잡도 기록 시트 -->
<div id="log-sheet">
  <div class="sheet-backdrop" onclick="closeLogSheet()"></div>
  <div class="log-panel">
    <div class="sheet-handle"></div>
    <div class="log-header">
      <span class="log-title">🚌 버스 혼잡도 기록</span>
      <button class="sheet-close" onclick="closeLogSheet()">✕</button>
    </div>
    <div class="log-scroll">
      <div class="log-field">
        <div class="log-field-label">날짜 / 시간</div>
        <input type="datetime-local" id="log-datetime" class="log-select" oninput="logState.datetime=this.value">
      </div>
      <div class="log-field">
        <div class="log-field-label">탑승한 버스</div>
        <select id="log-bus-sel" class="log-select" onchange="logState.bus=this.value">
          <option value="">버스를 선택하세요</option>
        </select>
      </div>
      <div class="log-field">
        <div class="log-field-label">혼잡도</div>
        <div class="crowd-btns">
          <button class="crowd-btn few" data-level="few" onclick="selCrowd('few')"><span class="crow-icon">🟢</span><span class="crow-lbl">여유</span></button>
          <button class="crowd-btn mid" data-level="mid" onclick="selCrowd('mid')"><span class="crow-icon">🟡</span><span class="crow-lbl">보통</span></button>
          <button class="crowd-btn many" data-level="many" onclick="selCrowd('many')"><span class="crow-icon">🔴</span><span class="crow-lbl">혼잡</span></button>
        </div>
      </div>
      <div class="log-history">
        <div class="log-history-label">최근 기록</div>
        <div id="log-history-list"></div>
      </div>
    </div>
    <button class="btn-log-save" onclick="saveLog()">기록 저장하기</button>
  </div>
</div>
</body>
</html>
